name: Comprehensive Bot Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
    
    - name: 🐍 Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-telegram-bot anthropic pytest pytest-asyncio pylint
    
    - name: 🔍 Lint with pylint
      run: |
        pylint bot_hybrid_smart.py --exit-zero --output-format=parseable > lint_report.txt
        cat lint_report.txt
      continue-on-error: true
    
    - name: 🧪 Run comprehensive tests
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        PAYMENT_PROVIDER_TOKEN: test_provider
      run: |
        python test_bot_comprehensive.py
    
    - name: 📊 Generate test report
      if: always()
      run: |
        if [ -f test_report.json ]; then
          echo "Test Report Generated:"
          cat test_report.json
        fi
    
    - name: 📤 Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          test_report.json
          test_results.log
          lint_report.txt
    
    - name: ❌ Fail if tests failed
      if: failure()
      run: |
        echo "Tests failed! Check the logs above."
        exit 1
    
    - name: ✅ Success notification
      if: success()
      run: |
        echo "✅ All tests passed!"
        echo "Python version: ${{ matrix.python-version }}"

  security-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
    
    - name: 🔐 Run security checks
      run: |
        pip install bandit
        bandit -r . -f json -o bandit_report.json || true
        cat bandit_report.json
    
    - name: 📤 Upload security report
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: bandit_report.json

  notify:
    needs: [test, security-check]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: 📧 Send notification
      run: |
        if [ "${{ needs.test.result }}" == "success" ]; then
          echo "✅ All tests passed!"
        else
          echo "❌ Some tests failed!"
        fi
